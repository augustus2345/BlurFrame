name: photo_beauty
description: A modern photo management app with frames, albums, and tags.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Photo & media
  photo_manager: ^3.6.4
  exif: ^3.3.0
  image: ^4.2.0
  flutter_image_compress: ^2.3.0
  gal: ^2.2.1

  # Permissions
  permission_handler: ^11.3.1

  # UI / utility
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.2
  collection: ^1.18.0
  cached_network_image: ^3.4.1

  # Date / time
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Misc
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/